<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sistema Terrence.M - Enterprise</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-primary">Panel de Control Terrence.M</h1>
        <div class="card p-4 shadow-lg border-0">
            <table class="table table-hover">
                <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr></thead>
                <tbody>{% for p in productos %}<tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody>
            </table>
        </div>
        <form action="/guardar" method="POST" class="mt-4 p-4 bg-white shadow-sm rounded">
            <h5>Agregar Nuevo Producto</h5>
            <div class="row g-2">
                <div class="col"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
                <div class="col"><input name="cantidad" class="form-control" type="number" placeholder="Cantidad" required></div>
                <div class="col"><input name="precio" class="form-control" type="number" step="0.01" placeholder="Precio" required></div>
                <div class="col"><button class="btn btn-primary w-100">Guardar</button></div>
            </div>
        </form>
    </div>
</body>
</html>
