<!DOCTYPE html>
<html lang="es">
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-4">
    <div class="container">
        <h2 class="mb-4 text-primary fw-bold">Terrence.M | Sistema de Inventario Pro</h2>
        <div class="row g-3 mb-4">
            <div class="col-4"><div class="card p-3 shadow-sm border-0"><h6>Productos</h6><h3 class="text-primary">{{ total }}</h3></div></div>
            <div class="col-4"><div class="card p-3 shadow-sm border-0"><h6>Total Stock</h6><h3 class="text-success">{{ stock }}</h3></div></div>
            <div class="col-4"><div class="card p-3 shadow-sm border-0"><h6>Valor Activos</h6><h3 class="text-dark">${{ "{:,.2f}".format(valor) }}</h3></div></div>
        </div>
        <table class="table bg-white shadow-sm rounded">
            <thead class="table-dark"><tr><th>ID</th><th>Producto</th><th>Cantidad</th><th>Precio</th></tr></thead>
            <tbody>{% for p in productos %}<tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody>
        </table>
        <form action="/guardar" method="POST" class="mt-4 p-4 bg-white shadow-sm rounded">
            <h5>Agregar Nuevo Ítem</h5>
            <div class="row g-2">
                <div class="col"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
                <div class="col"><input name="cantidad" class="form-control" type="number" placeholder="Cantidad" required></div>
                <div class="col"><input name="precio" class="form-control" type="number" step="0.01" placeholder="Precio" required></div>
                <div class="col"><button class="btn btn-primary w-100">Registrar</button></div>
            </div>
        </form>
    </div>
</body>
</html>
