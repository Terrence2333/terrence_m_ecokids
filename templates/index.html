<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Terrence.M | Sistema Corporativo</title>
    <style>
        .stats-card { border-radius: 15px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stats-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1>Panel Terrence.M</h1>
            <button class="btn btn-primary">Generar Reporte PDF</button>
        </header>
        <div class="row mb-4">
            <div class="col-md-4"><div class="stats-card p-4 bg-white"><h6>Productos</h6><h3>{{ total }}</h3></div></div>
            <div class="col-md-4"><div class="stats-card p-4 bg-white"><h6>Stock</h6><h3>{{ stock }}</h3></div></div>
            <div class="col-md-4"><div class="stats-card p-4 bg-white"><h6>Valor</h6><h3>${{ "{:,.2f}".format(valor) }}</h3></div></div>
        </div>
        <div class="card p-4 shadow-sm mb-4">
            <table class="table table-hover">
                <thead class="table-light"><tr><th>ID</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr></thead>
                <tbody>{% for p in productos %}<tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody>
            </table>
        </div>
        <form action="/guardar" method="POST" class="card p-4 shadow-sm">
            <h5>Registrar Nuevo Producto</h5>
            <div class="row g-3">
                <div class="col-md-4"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
                <div class="col-md-3"><input name="cantidad" class="form-control" type="number" placeholder="Cantidad" required></div>
                <div class="col-md-3"><input name="precio" class="form-control" type="number" step="0.01" placeholder="Precio" required></div>
                <div class="col-md-2"><button class="btn btn-success w-100">Guardar</button></div>
            </div>
        </form>
    </div>
</body>
</html>
