<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Terrence.M | Sistema Corporativo</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container"><span class="navbar-brand fw-bold">TERRENCE.M | ENTERPRISE CONTROL</span></div>
    </nav>
    <div class="container">
        <div class="row g-4 mb-4">
            <div class="col-md-4"><div class="card p-4 shadow-sm border-0"><h6>Total Productos</h6><h2 class="text-primary">{{ total }}</h2></div></div>
            <div class="col-md-4"><div class="card p-4 shadow-sm border-0"><h6>Stock Global</h6><h2 class="text-success">{{ stock }}</h2></div></div>
            <div class="col-md-4"><div class="card p-4 shadow-sm border-0"><h6>Valor Inventario</h6><h2 class="text-dark">${{ "{:,.2f}".format(valor) }}</h2></div></div>
        </div>
        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr></thead>
            <tbody>{% for p in productos %}<tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody>
        </table>
        <form action="/guardar" method="POST" class="card p-4 shadow-sm mt-4">
            <h5>Ingreso de Nuevos Activos</h5>
            <div class="row g-3">
                <div class="col-md-4"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
                <div class="col-md-3"><input name="cantidad" class="form-control" type="number" placeholder="Cantidad" required></div>
                <div class="col-md-3"><input name="precio" class="form-control" type="number" step="0.01" placeholder="Precio" required></div>
                <div class="col-md-2"><button class="btn btn-primary w-100">Registrar</button></div>
            </div>
        </form>
    </div>
</body>
</html>
