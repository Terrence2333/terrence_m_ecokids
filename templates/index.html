<!DOCTYPE html>
<html lang="es">
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-4">
    <div class="container">
        <h1 class="mb-4">Dashboard Terrence.M</h1>
        <div class="row mb-4">
            <div class="col-4"><h4>Productos: {{ total }}</h4></div>
            <div class="col-4"><h4>Stock: {{ stock }}</h4></div>
            <div class="col-4"><h4>Valor: ${{ "{:,.2f}".format(valor) if valor else '0.00' }}</h4></div>
        </div>
        <table class="table bg-white shadow-sm">
            <thead><tr><th>Nombre</th><th>Precio</th></tr></thead>
            <tbody>{% for p in productos %}<tr><td>{{ p.nombre }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody>
        </table>
        <form action="/guardar" method="POST" class="mt-4 p-3 bg-white shadow-sm">
            <h5>Nuevo Ingreso</h5>
            <input name="nombre" class="form-control mb-2" placeholder="Nombre" required>
            <input name="cantidad" class="form-control mb-2" type="number" placeholder="Cantidad" required>
            <input name="precio" class="form-control mb-2" type="number" step="0.01" placeholder="Precio" required>
            <button class="btn btn-primary">Guardar</button>
        </form>
    </div>
</body>
</html>
