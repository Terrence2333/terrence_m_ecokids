<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Terrence.M | Sistema Elite</title>
</head>
<body class="bg-dark text-white p-4">
    <div class="container">
        <div class="d-flex justify-content-between mb-4">
            <h1>Panel Terrence.M</h1>
            <a href="/descargar_reporte" class="btn btn-info">📥 Descargar Reporte PDF</a>
        </div>
        <div class="row text-center mb-4">
            <div class="col-4"><div class="bg-secondary p-3 rounded"><h4>Productos</h4><h2>{{ total }}</h2></div></div>
            <div class="col-4"><div class="bg-secondary p-3 rounded"><h4>Stock</h4><h2>{{ stock }}</h2></div></div>
            <div class="col-4"><div class="bg-secondary p-3 rounded"><h4>Valor</h4><h2>${{ "{:,.2f}".format(valor) }}</h2></div></div>
        </div>
        <div class="row">
            <div class="col-8"><table class="table table-dark table-striped"><thead><tr><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr></thead><tbody>{% for p in productos %}<tr><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody></table></div>
            <div class="col-4"><form action="/guardar" method="POST" class="bg-secondary p-3 rounded"><h5>Nuevo Ítem</h5><input type="text" name="nombre" class="form-control mb-2" required placeholder="Nombre"><input type="number" name="cantidad" class="form-control mb-2" required placeholder="Cantidad"><input type="number" step="0.01" name="precio" class="form-control mb-2" required placeholder="Precio"><button type="submit" class="btn btn-primary w-100">Guardar</button></form></div>
        </div>
    </div>
</body>
</html>
