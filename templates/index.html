<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terrence.M | Sistema</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .container { margin-top: 50px; background: #1e293b; padding: 30px; border-radius: 20px; }
        .card { background: #334155; padding: 20px; border-radius: 15px; display: inline-block; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: white; }
        th, td { padding: 15px; border-bottom: 1px solid #475569; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard Terrence.M</h1>
        <div class="card">Total: {{ total }}</div>
        <div class="card">Stock: {{ stock }}</div>
        <div class="card">Valor: {{ valor }}</div>
        <table>
            <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th></tr></thead>
            <tbody>
                {% for p in productos %}
                <tr><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>{{ p.precio }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
