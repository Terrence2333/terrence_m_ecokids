<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020406; color: #00d2ff; font-family: 'Courier New', monospace; }
        .cyber-panel { background: rgba(0, 210, 255, 0.05); border: 1px solid #00d2ff; padding: 20px; }
        .btn-neon { border: 1px solid #00d2ff; color: #00d2ff; background: transparent; text-transform: uppercase; }
        .btn-neon:hover { background: #00d2ff; color: #000; }
        .table { color: #00d2ff; }
        input, select { background: #0a0e14 !important; color: #00d2ff !important; border: 1px solid #00d2ff !important; }
    </style>
</head>
<body class="p-4">
    <h1 class="fw-bold">TERRENCE.M // SISTEMA MIGRATORIO V4.2</h1>
    <div class="row g-4 mt-2">
        <div class="col-md-3">
            <div class="cyber-panel">
                <h5>NUEVO EXPEDIENTE</h5>
                <form action="/agregar" method="POST">
                    <input name="nombre" class="form-control mb-3" placeholder="Nombre Ciudadano" required>
                    <select name="visa" class="form-select mb-3"><option>Visa Mercosur</option><option>Inversionista</option></select>
                    <button class="btn btn-neon w-100">REGISTRAR TRÁMITE</button>
                </form>
            </div>
            <div class="cyber-panel mt-3 text-center"><h6>REGISTROS TOTALES</h6><h2>{{regs|length}}</h2></div>
        </div>
        <div class="col-md-9">
            <div class="cyber-panel">
                <h5>BITÁCORA DE CONTROL</h5>
                <table class="table mt-3">
                    <thead><tr><th>ID</th><th>CIUDADANO</th><th>VISA</th><th>ESTADO</th></tr></thead>
                    <tbody>{% for r in regs %}<tr><td>{{r.id}}</td><td>{{r.nombre}}</td><td>{{r.visa}}</td><td>Sincronizado</td></tr>{% endfor %}</tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
