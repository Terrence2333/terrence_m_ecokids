<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-dark text-white p-5">
    <div class="container">
        <h1>Sistema Terrence.M - Semanas 11 y 12</h1>
        <form action="/guardar" method="POST" class="row g-3 bg-secondary p-3 rounded">
            <div class="col"><input type="text" name="nombre" class="form-control" placeholder="Nombre" required></div>
            <div class="col"><input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required></div>
            <div class="col"><button type="submit" class="btn btn-primary">Guardar Persistencia</button></div>
        </form>
        <table class="table table-dark mt-4">
            <thead><tr><th>Nombre</th><th>Precio</th></tr></thead>
            <tbody>{% for p in productos %}<tr><td>{{ p.nombre }}</td><td>${{ p.precio }}</td></tr>{% endfor %}</tbody>
        </table>
    </div>
</body>
</html>
