<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; color: #333; }
        h1 { text-align: center; color: #0ea5e9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #0ea5e9; color: white; }
        .footer { margin-top: 30px; font-size: 10px; text-align: center; color: #777; }
    </style>
</head>
<body>
    <h1>Reporte de Inventario - Terrence.M</h1>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.nombre }}</td>
                <td>{{ p.cantidad }}</td>
                <td>$ {{ p.precio }}</td>
                <td>$ {{ p.precio * p.cantidad }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="footer text-info">Generado por Terrence Mayorga - Sistema Élite v12</div>
</body>
</html>
