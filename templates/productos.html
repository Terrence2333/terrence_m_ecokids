{% extends "base.html" %}
{% block content %}
<h2>Gestión de Productos</h2>
<div class="card p-4 shadow-sm">
    <table class="table table-hover">
        <thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Acciones</th></tr></thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>${{ p.precio }}</td>
                <td><button class="btn btn-sm btn-warning">Editar</button> <button class="btn btn-sm btn-danger">Eliminar</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
